<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 90%;
            max-width: 600px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .joke-box {
            background: #f8f9fa;
            border: 3px solid #667eea;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .joke-text {
            font-size: 18px;
            color: #333;
            line-height: 1.6;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .joke-punchline {
            font-size: 16px;
            color: #555;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #ddd;
        }

        .joke-type {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 10px;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 16px;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
            min-width: 150px;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #48bb78;
            color: white;
            min-width: 150px;
        }

        .btn-secondary:hover {
            background: #38a169;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(72, 187, 120, 0.4);
        }

        .btn-secondary:active {
            transform: translateY(0);
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .btn-danger:hover {
            background: #e53e3e;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 101, 101, 0.4);
        }

        .btn-danger:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .category-select {
            padding: 10px 15px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            background: white;
            transition: all 0.3s;
        }

        .category-select:hover {
            border-color: #667eea;
        }

        .category-select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .error {
            background: #fed7d7;
            color: #c53030;
            border: 2px solid #fc8181;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .stats {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-top: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 22px;
                margin-bottom: 20px;
            }

            .joke-box {
                padding: 20px;
                min-height: 120px;
            }

            .controls {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            .category-select {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>😂 Random Joke Generator</h1>

        <div id="errorBox" class="error" style="display: none;"></div>

        <div class="joke-box" id="jokeBox">
            <div class="loading">Click "Get a Joke" to start! 🎉</div>
        </div>

        <div class="controls">
            <select id="categorySelect" class="category-select">
                <option value="general">General</option>
                <option value="knock-knock">Knock-Knock</option>
                <option value="programming">Programming</option>
                <option value="random">Random</option>
            </select>
            <button class="btn-primary" onclick="getJoke()">Get a Joke 🎲</button>
            <button class="btn-secondary" onclick="copyJoke()">Copy Joke 📋</button>
            <button class="btn-danger" onclick="shareJoke()">Share 🔗</button>
        </div>

        <div class="stats">
            <p>Jokes fetched: <span id="jokeCount">0</span></p>
        </div>
    </div>

    <script>
        let jokeCount = 0;
        let currentJoke = null;

        // API endpoints
        const APIs = {
            general: 'https://official-joke-api.appspot.com/jokes/general/random',
            'knock-knock': 'https://official-joke-api.appspot.com/jokes/knock-knock/random',
            programming: 'https://official-joke-api.appspot.com/jokes/programming/random',
            random: 'https://official-joke-api.appspot.com/random_joke'
        };

        // Alternative API for more variety
        const alternativeAPI = 'https://v2.jokeapi.dev/joke/Any?format=json';

        async function getJoke() {
            const jokeBox = document.getElementById('jokeBox');
            const errorBox = document.getElementById('errorBox');
            const categorySelect = document.getElementById('categorySelect');
            const category = categorySelect.value;

            // Show loading state
            jokeBox.innerHTML = '<div class="spinner"></div>';
            errorBox.style.display = 'none';

            try {
                let response;
                let data;

                // Try primary API first
                const apiUrl = APIs[category] || APIs.random;
                response = await fetch(apiUrl);

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                data = await response.json();

                // Format and display joke
                displayJoke(data, category);
                jokeCount++;
                document.getElementById('jokeCount').textContent = jokeCount;

            } catch (error) {
                console.error('Error fetching joke:', error);
                showError('Failed to fetch joke. Please try again!');
                jokeBox.innerHTML = '<div class="loading">❌ Could not load joke. Try again!</div>';
            }
        }

        function displayJoke(data, category) {
            const jokeBox = document.getElementById('jokeBox');
            let setupHTML = '';
            let deliveryHTML = '';

            // Handle different API response formats
            if (data.setup && data.delivery) {
                setupHTML = `<div class="joke-text">${data.setup}</div>`;
                deliveryHTML = `<div class="joke-punchline"><strong>Answer:</strong> ${data.delivery}</div>`;
            } else if (data.joke) {
                setupHTML = `<div class="joke-text">${data.joke}</div>`;
            } else if (typeof data === 'string') {
                setupHTML = `<div class="joke-text">${data}</div>`;
            }

            const typeHTML = `<span class="joke-type">${category.toUpperCase()}</span>`;

            jokeBox.innerHTML = `
                ${setupHTML}
                ${deliveryHTML}
                ${typeHTML}
            `;

            // Store current joke for copying and sharing
            currentJoke = data.setup ? `${data.setup}\n\n${data.delivery}` : (data.joke || data);
        }

        function showError(message) {
            const errorBox = document.getElementById('errorBox');
            errorBox.textContent = message;
            errorBox.style.display = 'block';
        }

        function copyJoke() {
            if (!currentJoke) {
                showError('No joke to copy. Get a joke first!');
                return;
            }

            navigator.clipboard.writeText(currentJoke).then(() => {
                showError('✅ Joke copied to clipboard!');
                setTimeout(() => {
                    document.getElementById('errorBox').style.display = 'none';
                }, 2000);
            }).catch(() => {
                showError('Failed to copy joke.');
            });
        }

        function shareJoke() {
            if (!currentJoke) {
                showError('No joke to share. Get a joke first!');
                return;
            }

            const text = `Check out this joke: ${currentJoke}\n\nGenerated by Random Joke Generator 😂`;

            if (navigator.share) {
                navigator.share({
                    title: 'Check out this joke!',
                    text: text
                }).catch(err => console.log('Share cancelled:', err));
            } else {
                // Fallback: copy to clipboard
                navigator.clipboard.writeText(text).then(() => {
                    showError('✅ Joke shared to clipboard!');
                    setTimeout(() => {
                        document.getElementById('errorBox').style.display = 'none';
                    }, 2000);
                });
            }
        }

        // Load a joke when the page loads
        window.addEventListener('load', () => {
            // Optional: uncomment to auto-load a joke on page load
            // getJoke();
        });
    </script>
</body>
</html>
